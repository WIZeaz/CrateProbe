services:
  backend:
    build:
      context: ./backend
      dockerfile: docker/Dockerfile.backend
    ports:
      - "8080:8080"
    volumes:
      - ./workspace:/app/workspace
      - ./config.toml:/app/config.toml:ro
    environment:
      - CONFIG_PATH=/app/config.toml
    command: ["python", "-m", "app.main"]

  frontend:
    image: node:20-slim
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=http://localhost:8080
      - VITE_WS_BASE_URL=ws://localhost:8080
    command: ["sh", "-c", "npm install && npm run dev"]

  runner:
    build:
      context: ./backend
      dockerfile: docker/Dockerfile.runner
    privileged: true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./workspace:/workspace
    environment:
      - RUNNER_SERVER_URL=http://backend:8080
      - RUNNER_ID=local-runner
      - RUNNER_TOKEN=${RUNNER_TOKEN}
      - RUNNER_MAX_JOBS=3
      - RUNNER_MAX_MEMORY_GB=20
      - RUNNER_MAX_RUNTIME_SECONDS=86400
      - RUNNER_DOCKER_IMAGE=rust-cargo-rapx:latest
      - RUNNER_DOCKER_PULL_POLICY=if-not-present
    depends_on:
      - backend
